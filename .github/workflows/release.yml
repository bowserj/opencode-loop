name: release-zip

on:
  push:
    tags:
      - "v*"

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create zip
        run: zip -r bybrawe-opencode-loop.zip . -x "*.git*"
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: bybrawe-opencode-loop.zip
